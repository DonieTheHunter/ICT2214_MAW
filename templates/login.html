{% extends "auth_base.html" %}
{% block title %}MAW - Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-6 col-lg-7 col-md-9">
    <div class="card o-hidden border-0 shadow-lg my-5">
      <div class="card-body p-0">
        <div class="p-5">
          <div class="text-center">
            <h1 class="h4 text-gray-900 mb-4">MAW Login</h1>
          </div>

          <form class="user" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
              <input class="form-control form-control-user" name="username_or_email" placeholder="Username or Email" required>
            </div>
            <div class="form-group">
              <input type="password" class="form-control form-control-user" name="password" placeholder="Password" required>
            </div>
            <button class="btn btn-primary btn-user btn-block" type="submit">Login</button>
          </form>

          <hr>
          <div class="text-center">
            <a class="small" href="{{ url_for('register') }}">Create an Account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
