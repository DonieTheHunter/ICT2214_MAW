{% extends "auth_base.html" %}
{% block title %}MAW - Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-6 col-lg-7 col-md-9">
    <div class="card o-hidden border-0 shadow-lg my-5">
      <div class="card-body p-0">
        <div class="p-5">
          <div class="text-center">
            <h1 class="h4 text-gray-900 mb-4">Create an Account</h1>
          </div>

          <form class="user" method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
              <input class="form-control form-control-user"
                     name="username"
                     autocomplete="username"
                     placeholder="Username"
                     required>
            </div>

            <div class="form-group">
              <input type="email"
                     class="form-control form-control-user"
                     name="email"
                     autocomplete="email"
                     placeholder="Email"
                     required>
            </div>

            <div class="form-group">
              <input type="password"
                     class="form-control form-control-user"
                     name="password"
                     autocomplete="new-password"
                     placeholder="Password (min 8 characters)"
                     required>
            </div>

            <div class="form-group">
              <input type="password"
                     class="form-control form-control-user"
                     name="confirm"
                     autocomplete="new-password"
                     placeholder="Confirm Password"
                     required>
            </div>

            <button class="btn btn-primary btn-user btn-block" type="submit">Register Account</button>
          </form>

          <hr>
          <div class="text-center">
            <a class="small" href="{{ url_for('login') }}">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
